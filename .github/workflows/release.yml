name: Build & Release

on:
  push:
    tags:
      - 'v*'
      - '!panel-v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  # ─── Build eBPF program (nightly, bpf target, architecture-independent) ───
  build-ebpf:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust + BPF target
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache eBPF build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/xdp-ebpf

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Build eBPF program
        working-directory: rust/xdp-ebpf
        run: |
          cargo build \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release

      - name: Upload eBPF binary
        uses: actions/upload-artifact@v4
        with:
          name: xdp-ebpf
          path: rust/xdp-ebpf/target/bpfel-unknown-none/release/xdp-ebpf
          retention-days: 1

  # ─── Test Rust ───
  test-rust:
    needs: build-ebpf
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install libelf-dev
        run: sudo apt-get update && sudo apt-get install -y libelf-dev

      - name: Download eBPF binary
        uses: actions/download-artifact@v4
        with:
          name: xdp-ebpf
          path: rust/xdp-ebpf/target/bpfel-unknown-none/release/

      - name: Rust test
        working-directory: rust
        run: cargo test

  # ─── Build spoof-tunnel (CGO_ENABLED=1, Rust + Go, Linux only) ───
  build-tunnel:
    needs: [test-rust, build-ebpf]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            rust_target: x86_64-unknown-linux-gnu
            cc: gcc
          - goarch: arm64
            rust_target: aarch64-unknown-linux-gnu
            cc: aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install cross-compilation tools & libelf-dev
        run: |
          sudo apt-get update
          sudo apt-get install -y libelf-dev
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Download eBPF binary
        uses: actions/download-artifact@v4
        with:
          name: xdp-ebpf
          path: rust/xdp-ebpf/target/bpfel-unknown-none/release/

      - name: Build Rust library
        working-directory: rust
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.rust_target }}

      - name: Copy Rust library to expected path
        run: |
          mkdir -p rust/target/release
          cp rust/target/${{ matrix.rust_target }}/release/libspoof_transport.a rust/target/release/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          BINARY_NAME="spoof-linux-${{ matrix.goarch }}"
          go build -ldflags="-s -w" -o "${BINARY_NAME}" ./cmd/spoof/
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spoof-linux-${{ matrix.goarch }}
          path: ${{ env.BINARY_NAME }}
          retention-days: 1

  # ─── Build panel frontend ───
  build-frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & Build
        working-directory: panel/frontend
        run: |
          npm ci
          npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: panel/frontend/out/
          retention-days: 1

  # ─── Build panel (pure Go, CGO_ENABLED=0, static binary) ───
  build-panel:
    needs: build-frontend
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: panel/backend/cmd/panel/web/

      - name: Build panel
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        working-directory: panel/backend
        run: |
          go build -ldflags="-s -w" \
            -o ../../spoof-panel-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/panel/

      - name: Verify binary
        run: |
          file spoof-panel-${{ matrix.goos }}-${{ matrix.goarch }}
          ls -lh spoof-panel-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload panel binary
        uses: actions/upload-artifact@v4
        with:
          name: panel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: spoof-panel-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  # ─── Create Release (tunnel + panel) ───
  release:
    needs: [build-tunnel, build-panel]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum spoof-* > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/spoof-*
            dist/checksums.txt
